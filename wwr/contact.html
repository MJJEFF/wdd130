<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting</title>
    <meta name="description"
      content="Contact White Water Rafting Company. Reach out via phone, email, or our contact form.">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <!-- header section -->
    <header>
        <img src="images/rafting.jpg" alt="rafting logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <!-- main section -->
    <main>
        <div class="address">
            <h1 class="address-title">White Water Rafting</h1>
            <p>Afiesere Town, Ughelli</p>
            <p>Delta State, Nigeria</p>
            <p>+2349021780920</p>
            <p>info@whitewaterrafting.com</p>
        </div>
        <section class="embededmap-contact">
            <div class="embededmap">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d992.814899287891!2d6.042601722168175!3d5.528452787984584!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1041a2b366752f6b%3A0xca770e5e58eb3943!2sAfiesere%20333106%2C%20Delta!5e0!3m2!1sen!2sng!4v1775320476023!5m2!1sen!2sng"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <div class="form-item column1">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name">
                </div>
                <div class="form-item column1">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                </div>
                <div class="form-item column2">
                    <div class="msg-pps">
                        <label>Message</label><br>
                        <label>Purpose</label>
                    </div>
                    <div class="radios">
                        <input type="radio" id="general" name="purpose" value="general">
                        <label for="general">General Inquiry</label><br>
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label for="reservation">Reservation</label><br>
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        <label for="suggestion">Website Suggestion</label><br>
                    </div>
                </div>
                <div class="form-item column3">
                    <label for="message">Message</label>
                    <textarea id="message" name="message"
                      placeholder="Type your message here..."></textarea>
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                    <button type="submit">Get in Touch</button>
                </div>
            </form>
        </section>
        <section class="service">
            <h2 class="service-title">We are Here to Serve You</h2>
            <div class="employee-profiles">
                <div class="employee">
                    <img src="images/employee1.jpg" alt="Victor Charles, rafting guide" width="90">
                    <h3>Victor Charles</h3>
                    <p>Guide</p>
                </div>
                <div class="employee">
                    <img src="images/employee2.jpg" alt="James Samuel, rafting manager" width="90">
                    <h3>James Samuel</h3>
                    <p>Manager</p>
                </div>
                <div class="employee">
                    <img src="images/employee3.jpg" alt="Melvin Webb, CEO of White Water Rafting"
                      width="90">
                    <h3>Melvin Webb</h3>
                    <p>CEO</p>
                </div>
            </div>
        </section>
    </main>
    <!-- footer -->
    <footer>
        <p>&copy;2026 White Water Rafting | Jeffrey Akanama</p>
        <nav class="socialmedia">
            <a href="https//facebook.com">
                <img src="images/facebook.svg" width="50px" height="50px" alt="Facebook Icon"></a>
            <a href="https//linkedin.com">
                <img src="images/linkedin.svg" width="50px" height="50px" alt="Linkedin Icon"></a>
            <a href="https//instagram.com">
                <img src="images/instagram.svg" width="50px" height="50px" alt="Instagram Icon"></a>
        </nav>
    </footer>
</body>

</html>
